<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psicologia AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--card);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 28px rgba(30, 58, 69, 0.08);
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .login-heading { display: flex; flex-direction: column; gap: 6px; }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.85rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.15;
    }

    .login-sub {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .login-form { display: flex; flex-direction: column; gap: 10px; }

    .login-input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 0.94rem;
      color: var(--ink);
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--bg-base);
      border: 1.5px solid rgba(30, 58, 69, 0.1);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .login-input:focus { border-color: var(--aqua); }
    .login-input::placeholder { color: var(--muted); }

    .login-error {
      font-size: 0.8rem;
      color: #d95f5f;
      min-height: 1.1em;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: var(--gradient);
      color: white;
      font-family: var(--font-body);
      font-size: 0.94rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .login-btn:hover { opacity: 0.88; }
    .login-btn:focus-visible { outline: 3px solid var(--sky); outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-heading">
        <h1 class="login-title">Psicologia AI</h1>
        <p class="login-sub">Acesso restrito</p>
      </div>
      <form class="login-form" id="login-form" novalidate>
        <input class="login-input" type="password" id="pwd"
               placeholder="senha" autocomplete="current-password" required>
        <p class="login-error" id="login-error" aria-live="polite"></p>
        <button class="login-btn" type="submit">Entrar</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const pwd      = document.getElementById('pwd');
      const errorEl  = document.getElementById('login-error');
      errorEl.textContent = '';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd.value }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          errorEl.textContent = 'Senha incorreta';
          pwd.select();
        }
      } catch {
        errorEl.textContent = 'Erro de conexão';
      }
    });
  </script>
</body>
</html>
