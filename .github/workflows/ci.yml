name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  AWS_REGION: eu-north-1

jobs:

  # ── 1. Testes ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/test_service.py tests/test_routes.py -v
        env:
          FLASK_SECRET_KEY: ci-secret-key

  # ── 2. Deploy (só em push no master, não em PR) ────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # ── Terraform: cria infra se não existe, não faz nada se já existe ──────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init + apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve
          echo "EC2_IP=$(terraform output -raw ec2_ip)" >> $GITHUB_ENV
          echo "ECR_URL=$(terraform output -raw ecr_url)" >> $GITHUB_ENV

      # ── Build da imagem Docker ───────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        run: |
          docker build -t ${{ env.ECR_URL }}:latest .
          docker push ${{ env.ECR_URL }}:latest

      # ── Push pro Docker Hub (portfólio público) ──────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: |
          docker tag ${{ env.ECR_URL }}:latest ${{ secrets.DOCKERHUB_USERNAME }}/psych-ai-chat:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/psych-ai-chat:latest

      # ── Deploy no EC2: puxa nova imagem e reinicia container ─────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-north-1 | \
              docker login --username AWS --password-stdin ${{ env.ECR_URL }}
            docker pull ${{ env.ECR_URL }}:latest
            docker stop psych-ai-chat 2>/dev/null || true
            docker rm psych-ai-chat 2>/dev/null || true
            docker run -d \
              --name psych-ai-chat \
              --restart unless-stopped \
              -p 5000:5000 \
              -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              -e APP_PASSWORD="${{ secrets.APP_PASSWORD }}" \
              -e FLASK_SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
              ${{ env.ECR_URL }}:latest
